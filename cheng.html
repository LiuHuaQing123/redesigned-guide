<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFILE // RISE_OF_THE_KING</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Courier New', Courier, monospace;
            background-color: #050505;
            color: #00f3ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
            border-bottom: 1px solid #00f3ff;
            padding-bottom: 10px;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

        /* 二级接口：时间轴/卡片样式 */
        .timeline-container {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        /* 中心线 */
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #00f3ff;
            box-shadow: 0 0 10px #00f3ff;
        }

        .stage-card {
            position: relative;
            margin-left: 50px;
            margin-bottom: 40px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid #333;
            padding: 15px;
            transition: 0.3s;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%);
        }

        .stage-card:hover {
            border-color: #00f3ff;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            transform: translateX(10px);
        }

        /* 节点圆点 */
        .stage-card::before {
            content: '';
            position: absolute;
            left: -36px;
            top: 20px;
            width: 14px;
            height: 14px;
            background: #050505;
            border: 2px solid #00f3ff;
            border-radius: 50%;
            box-shadow: 0 0 5px #00f3ff;
        }

        .stage-title {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .stage-img {
            width: 100%;
            height: auto;
            border: 1px solid #444;
            filter: grayscale(0.5);
            transition: 0.3s;
        }

        .stage-card:hover .stage-img {
            filter: grayscale(0);
        }

        .del-link {
            margin-top: 50px;
            opacity: 0.5;
            text-decoration: line-through;
            color: #555;
        }
    </style>
</head>
<body>

</body>
