<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL ARCHIVE // DELTA_SEQUENCE</title>
    <style>
        /* 全局重置与基础科技风背景 */
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Courier New', Courier, monospace;
            background-color: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* 三角洲风格背景：深色网格 + 战术黄点缀 */
            background-image: 
                linear-gradient(rgba(255, 200, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 200, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 50px;
            color: #ffcc00; /* 战术黄 */
            text-shadow: 0 0 10px rgba(255, 200, 0, 0.3);
            border-bottom: 2px solid #ffcc00;
            padding-bottom: 10px;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 95% 100%, 0 100%);
            background: rgba(0,0,0,0.5);
            padding-right: 20px;
        }

        /* 连环画容器：3D 透视空间 */
        .comic-stack {
            position: relative;
            width: 100%;
            max-width: 500px;
            perspective: 1000px;
            display: flex;
            flex-direction: column;
            gap: -40px;
        }

        /* 单个画面卡片 - 战术风格 */
        .frame-card {
            position: relative;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #444;
            border-left: 4px solid #ffcc00; /* 左侧战术黄条 */
            padding: 8px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            transform: rotateX(5deg) scale(0.95); 
            opacity: 0.9;
            z-index: 1;
            /* 漫画感：轻微噪点 */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }

        /* 偶数项反向倾斜 */
        .frame-card:nth-child(even) {
            transform: rotateX(-5deg) scale(0.95) translateZ(-20px);
            margin-top: -60px;
            border-left: 1px solid #444;
            border-right: 4px solid #ffcc00; /* 右侧战术黄条 */
        }

        /* 悬停效果：高亮、正视 */
        .frame-card:hover {
            transform: rotateX(0deg) scale(1.02) translateZ(50px);
            opacity: 1;
            z-index: 10;
            border-color: #ffcc00;
            box-shadow: 0 0 15px rgba(255, 200, 0, 0.2);
            background: rgba(30, 30, 30, 0.95);
        }

        .frame-card img {
            width: 100%;
            height: auto;
            display: block;
            /* 漫画感：高对比度、去色、锐化 */
            filter: grayscale(100%) contrast(1.4) brightness(0.9);
            border: 1px solid #333;
        }

        .frame-card:hover img {
            /* 悬停时恢复部分色彩，模拟战术视野开启 */
            filter: grayscale(0%) contrast(1.2) brightness(1.1);
        }

        /* 装饰性数据标签 - 战术风格 */
        .data-tag {
            position: absolute;
            top: -10px;
            right: 10px;
            background: #ffcc00;
            color: #000;
            font-size: 0.7rem;
            padding: 2px 8px;
            font-weight: bold;
            transform: translateZ(20px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            clip-path: polygon(10% 0, 100% 0, 100% 100%, 0 100%, 0 20%);
        }

        /* 扫描线动画 */
        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        .scan-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
        }

        /* 新增：突出的战术按钮 */
        .tactical-btn-container {
            margin-top: 60px;
            z-index: 100;
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
        }

        .tactical-btn {
            display: inline-block;
            background: #ffcc00;
            color: #000;
            font-weight: 900;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid #ffcc00;
            position: relative;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            transition: all 0.2s ease;
            box-shadow: 0 0 20px rgba(255, 200, 0, 0.4);
            animation: pulse 2s infinite;
        }

        .tactical-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 200, 0, 0.8);
            transform: scale(1.05);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 200, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 200, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 200, 0, 0); }
        }
    </style>
</head>
